# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json
name: "Codeql"

run-name: "CodeQL • ${{ github.ref_name }} @${{ github.actor }}"

on:
    merge_group:
        types:
            - "checks_requested"
    pull_request:
    push:
        branches:
            - "main"
    schedule:
        - cron: "37 9 * * 1"

concurrency:
    group: "codeql-${{ github.ref }}"
    cancel-in-progress: true

jobs:
    analyze:
        name: "Analyze"
        runs-on: "ubuntu-latest"
        timeout-minutes: 20
        permissions:
            actions: "read"
            contents: "read"
            security-events: "write"

        steps:
            - name: "Harden Runner"
              uses: "step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e" # v2.14.2
              with:
                  egress-policy: "audit"

            - name: "Checkout Repository"
              uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd" # v6.0.2

            - name: "Initialize CodeQL"
              uses: "github/codeql-action/init@8e52c9d6d12b70f2bf8f94bfe03e9980250bd2c4" # v4.31.6
              with:
                  languages: "javascript-typescript"

            - name: "Perform CodeQL Analysis"
              uses: "github/codeql-action/analyze@8e52c9d6d12b70f2bf8f94bfe03e9980250bd2c4" # v4.31.6
              with:
                  category: "/language:javascript-typescript"
